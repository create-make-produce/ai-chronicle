# =============================================
# AI Chronicle - 新着ツール収集ワークフロー
# =============================================
# 毎日 UTC 02:00 に自動実行
# （日本時間 AM 11:00）
# =============================================

name: Collect New Tools

on:
  schedule:
    - cron: '0 2,6,10,14,18,22 * * *'  # 4時間ごと（UTC 02/06/10/14/18/22時）
  workflow_dispatch:      # 手動実行も可能

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run collect-new-tools script
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          PRODUCT_HUNT_API_KEY: ${{ secrets.PRODUCT_HUNT_API_KEY }}
          PRODUCT_HUNT_API_SECRET: ${{ secrets.PRODUCT_HUNT_API_SECRET }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx tsx scripts/collect-new-tools.ts
