# =============================================
# AI Chronicle - 新着ツール収集ワークフロー
# =============================================
# JST: 00:22 / 01:52 / 03:22 / 04:52 / 06:22 / 07:52 / 09:22 / 10:52
#      12:22 / 13:52 / 15:22 / 16:52 / 18:22 / 19:52 / 21:22 / 22:52
# =============================================

name: Collect New Tools

on:
  schedule:
    - cron: '22 15,16,18,19,21,22,0,1,3,4,6,7,9,10,12,13 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run collect-new-tools script
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          PRODUCT_HUNT_API_KEY: ${{ secrets.PRODUCT_HUNT_API_KEY }}
          PRODUCT_HUNT_API_SECRET: ${{ secrets.PRODUCT_HUNT_API_SECRET }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx tsx scripts/collect-new-tools.ts
