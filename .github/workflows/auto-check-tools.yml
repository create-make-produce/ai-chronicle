# =============================================
# AI Chronicle - AIツール自動判定ワークフロー
# =============================================
# collect-new-toolsの10分後に実行（1時間30分おき）
# 未処理ツール（is_published=1 & admin_checked=0）を全件判定
# 429（RPD上限）に当たったら即中断・次回起動時に続きから再開
# =============================================

name: Auto Check Tools

on:
  schedule:
    - cron: '32 15,16,18,19,21,22,0,1,3,4,6,7,9,10,12,13 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run auto-check-tools script
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GMAIL_FROM: ${{ secrets.GMAIL_FROM }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: npx tsx scripts/auto-check-tools.ts
