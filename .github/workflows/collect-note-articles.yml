name: Collect Note Articles

on:
  # スケジュール実行（GitHub Actions再開後に有効化）
  # schedule:
  #   - cron: '0 3 * * *'  # JST 12:00

  # 手動実行トリガー（GitHubのActionsタブから実行可能）
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Collect Note popular articles
        run: npx tsx scripts/collect-note-articles.ts
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
