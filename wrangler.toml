# =============================================
# AI Chronicle - Cloudflare Wrangler 設定
# =============================================

name = "ai-chronicle"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# OpenNext Workers用
main = ".open-next/worker.js"

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# D1データベースバインディング
[[d1_databases]]
binding = "DB"
database_name = "ai-chronicle-db"
database_id = "f6fecbd5-d72c-4b80-b4ae-42746a527583"

# R2バケット（Phase 2以降に有効化）
# [[r2_buckets]]
# binding = "NEXT_INC_CACHE_R2_BUCKET"
# bucket_name = "ai-chronicle-cache"
