# =============================================
# AI Chronicle - Cloudflare Wrangler 設定
# =============================================

name = "ai-chronicle"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# OpenNext用（旧: .vercel/output/static）
pages_build_output_dir = ".open-next/assets"

# D1データベースバインディング
[[d1_databases]]
binding = "DB"
database_name = "ai-chronicle-db"
database_id = "f6fecbd5-d72c-4b80-b4ae-42746a527583"

# R2バケット（Phase 2以降に有効化）
# [[r2_buckets]]
# binding = "ASSETS"
# bucket_name = "ai-chronicle-assets"

# 環境変数（公開しても問題ないもののみ）
[vars]
NEXT_PUBLIC_SITE_URL = "https://ai-chronicle.com"
